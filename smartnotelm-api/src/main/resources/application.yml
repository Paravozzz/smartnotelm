spring:
  application:
    name: smartnotelm-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/smartnotelm}
    username: ${SPRING_DATASOURCE_USERNAME:smartnotelm}
    password: ${SPRING_DATASOURCE_PASSWORD:smartnotelm}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:8080
  embeddings:
    enabled: ${EMBEDDINGS_ENABLED:true}
    dimensions: ${EMBEDDING_DIMENSIONS:768}
    provider: ${EMBEDDING_PROVIDER:ollama}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
